name: Deploy to GitHub Pages

# 触发条件：当有代码推送到 main 分支时，自动执行
on:
  push:
    branches:
      - main

# 执行的任务
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest  # 使用最新的 Ubuntu 环境
    steps:
      # 1. 检出代码（把仓库代码下载到 Actions 环境）
      - name: Checkout code
        uses: actions/checkout@v3

      # 2. 设置 Node.js 环境（Vite 需要 Node.js）
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 24  

      # 3. 安装依赖
      - name: Install dependencies
        run: npm install

      # 4. 打包项目（Vite 会生成 dist 目录，包含所有静态文件）
      - name: Build project
        run: npm run build

      # 5. 部署到 GitHub Pages（使用官方 action）
      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist  # 要部署的文件夹（Vite 打包后默认输出到 dist）
          branch: gh-pages  # 部署到 gh-pages 分支（GitHub Pages 会自动识别这个分支）
