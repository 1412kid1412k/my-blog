name: Deploy to GitHub Pages

# 触发条件：当有代码推送到 main 分支时，自动执行
on:
  push:
    branches:
      - main

# 执行的任务
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      # 1. 检出代码
      - name: Checkout code
        uses: actions/checkout@v3

      # 2. 设置 Node.js 环境
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 24  

      # 3. 安装依赖
      - name: Install dependencies
        run: npm install

      # 4. 打包项目
      - name: Build project
        run: npm run build

      # 5. 部署到 GitHub Pages（⚠️ 关键修正：移除 github_token 参数）
      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist
          branch: gh-pages
